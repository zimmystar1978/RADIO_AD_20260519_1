<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mission Video</title>

<style>
body{
    margin:0;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

video{
    width:100%;
    height:100%;
    object-fit:cover;
}
</style>
</head>

<body>

<video
    autoplay
    muted
    playsinline
    controls>
    
    <source src="26Mission_Radio_AD_0519.mp4" type="video/mp4">
</video>

<button id="playBtn">
▶ 작전 시작
</button>

<script>
const video = document.getElementById('video');
const btn = document.getElementById('playBtn');

btn.addEventListener('click', () => {
    video.play();
    btn.style.display = 'none';
});
</script>

</body>
</html>
